<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="agentguard — catch hidden agent-instructions in your dependencies. An offline single-binary Go scanner that walks dependency prose channels and flags imperative text aimed at coding agents.">
  <defs>
    <linearGradient id="hd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C1410"/>
      <stop offset="1" stop-color="#0F0B0A"/>
    </linearGradient>
    <linearGradient id="hd-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="hd-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FCA5A5"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1000" height="280" rx="20" fill="url(#hd-bg)"/>
  <rect x="10" y="10" width="980" height="260" rx="16" fill="none" stroke="#F59E0B" stroke-opacity="0.30" stroke-width="1.5" stroke-dasharray="7 6"/>

  <!-- Shield + scan mark -->
  <g transform="translate(72,64)">
    <path d="M76 4 L140 26 V84 C140 124 112 148 76 160 C40 148 12 124 12 84 V26 Z" fill="url(#hd-shield)"/>
    <path d="M76 4 L140 26 V84 C140 124 112 148 76 160 C40 148 12 124 12 84 V26 Z" fill="none" stroke="#FCD34D" stroke-opacity="0.6" stroke-width="2"/>
    <g stroke="#1C1410" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <line x1="40" y1="54" x2="112" y2="54"/>
      <line x1="40" y1="76" x2="100" y2="76"/>
      <line x1="40" y1="98" x2="112" y2="98"/>
    </g>
    <line x1="40" y1="120" x2="92" y2="120" stroke="#7F1D1D" stroke-width="5" stroke-linecap="round"/>
    <circle cx="108" cy="120" r="9" fill="#1C1410" stroke="#FCA5A5" stroke-width="2.5"/>
    <text x="108" y="124.5" text-anchor="middle" font-size="13" font-weight="800" fill="#FCA5A5">!</text>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(260,0)">
    <text x="0" y="118" font-size="74" font-weight="800" fill="url(#hd-word)" letter-spacing="-2">agentguard</text>
    <text x="3" y="158" font-size="22" font-weight="600" fill="#FCD9B6">catch hidden agent-instructions in your dependencies</text>
    <g font-size="14" font-weight="600" fill="#FCD34D">
      <rect x="3" y="184" width="196" height="34" rx="17" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.45" stroke-width="1.2"/>
      <text x="101" y="206" text-anchor="middle">offline · single binary</text>
      <rect x="211" y="184" width="150" height="34" rx="17" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.45" stroke-width="1.2"/>
      <text x="286" y="206" text-anchor="middle">30-rule corpus</text>
      <rect x="373" y="184" width="176" height="34" rx="17" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.45" stroke-width="1.2"/>
      <text x="461" y="206" text-anchor="middle">SARIF 2.1.0 · CI gate</text>
    </g>
  </g>
</svg>
