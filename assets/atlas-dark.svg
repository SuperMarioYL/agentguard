<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="agentguard architecture: a dependency tree enters the walker, which enumerates npm/pypi/go/generic prose channels (README, CHANGELOG, docstrings, manifest fields), feeds them to the detector (YAML corpus plus proximity heuristics), which emits findings rendered as text or SARIF and gates the CI exit code">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <!-- offline / no-LLM frame -->
  <rect x="24" y="28" width="832" height="308" rx="18" fill="none" stroke="#F2B705" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="50" font-size="13" font-weight="600" fill="#F2C95B">offline · stdlib-first · no LLM · single static binary</text>

  <!-- connectors -->
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="222" y1="200" x2="282" y2="200" marker-end="url(#ah-d)"/>
    <line x1="470" y1="200" x2="530" y2="200" marker-end="url(#ah-d)"/>
    <line x1="700" y1="200" x2="700" y2="244" marker-end="url(#ah-d)"/>
  </g>

  <!-- Dependency tree -->
  <g>
    <rect x="44" y="92" width="178" height="216" rx="15" fill="#94A3B8" fill-opacity="0.10" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="133" y="118" text-anchor="middle" font-size="15" font-weight="600" fill="#CBD5E1">Dependency tree</text>
    <g font-size="11" fill="#CBD5E1">
      <rect x="62" y="134" width="142" height="38" rx="9" fill="#94A3B8" fill-opacity="0.12" stroke="#94A3B8" stroke-width="1.1"/>
      <text x="74" y="151" font-weight="600" fill="#E2E8F0">node_modules/</text>
      <text x="74" y="166">README · CHANGELOG</text>
      <rect x="62" y="178" width="142" height="38" rx="9" fill="#94A3B8" fill-opacity="0.12" stroke="#94A3B8" stroke-width="1.1"/>
      <text x="74" y="195" font-weight="600" fill="#E2E8F0">.venv / site-packages</text>
      <text x="74" y="210">README · docstrings</text>
      <rect x="62" y="222" width="142" height="38" rx="9" fill="#94A3B8" fill-opacity="0.12" stroke="#94A3B8" stroke-width="1.1"/>
      <text x="74" y="239" font-weight="600" fill="#E2E8F0">vendor / pkg/mod</text>
      <text x="74" y="254">README · doc.go</text>
      <rect x="62" y="266" width="142" height="30" rx="9" fill="#94A3B8" fill-opacity="0.06" stroke="#94A3B8" stroke-width="1.1"/>
      <text x="133" y="285" text-anchor="middle" font-weight="600" fill="#E2E8F0">source code — never read</text>
    </g>
  </g>

  <!-- Walker -->
  <g>
    <rect x="282" y="92" width="188" height="216" rx="15" fill="#4DA3FF" fill-opacity="0.14" stroke="#4DA3FF" stroke-width="1.6"/>
    <text x="376" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#9CCBFF">Walker</text>
    <text x="376" y="136" text-anchor="middle" font-size="11" fill="#9CCBFF">extract prose channels only</text>
    <g font-size="11.5">
      <rect x="300" y="150" width="152" height="34" rx="9" fill="#000000" fill-opacity="0.25" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="376" y="171" text-anchor="middle" fill="#9CCBFF">node.go · npm</text>
      <rect x="300" y="190" width="152" height="34" rx="9" fill="#000000" fill-opacity="0.25" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="376" y="211" text-anchor="middle" fill="#9CCBFF">python.go · pypi</text>
      <rect x="300" y="230" width="152" height="34" rx="9" fill="#000000" fill-opacity="0.25" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="376" y="251" text-anchor="middle" fill="#9CCBFF">gomod.go · go</text>
      <rect x="300" y="270" width="152" height="28" rx="9" fill="#000000" fill-opacity="0.25" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="376" y="289" text-anchor="middle" fill="#9CCBFF">generic fallback</text>
    </g>
  </g>

  <!-- Detector -->
  <g>
    <rect x="530" y="92" width="170" height="216" rx="15" fill="#F2B705" fill-opacity="0.14" stroke="#F2B705" stroke-width="1.6"/>
    <text x="615" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#F2C95B">Detector</text>
    <text x="615" y="136" text-anchor="middle" font-size="11" fill="#F2C95B">per-line, dedup, severity</text>
    <g font-size="11.5">
      <rect x="548" y="152" width="134" height="48" rx="9" fill="#000000" fill-opacity="0.25" stroke="#F2B705" stroke-width="1.1"/>
      <text x="615" y="170" text-anchor="middle" font-weight="600" fill="#F2C95B">YAML corpus</text>
      <text x="615" y="187" text-anchor="middle" fill="#F2C95B">30 AG-rules · go:embed</text>
      <rect x="548" y="208" width="134" height="48" rx="9" fill="#000000" fill-opacity="0.25" stroke="#F2B705" stroke-width="1.1"/>
      <text x="615" y="226" text-anchor="middle" font-weight="600" fill="#F2C95B">heuristics H001/H002</text>
      <text x="615" y="243" text-anchor="middle" fill="#F2C95B">verb × agent-address</text>
      <rect x="548" y="264" width="134" height="34" rx="9" fill="#F2B705" fill-opacity="0.20" stroke="#F2B705" stroke-width="1.1"/>
      <text x="615" y="285" text-anchor="middle" font-weight="600" fill="#F2C95B">findings</text>
    </g>
  </g>

  <!-- Reporters -->
  <g>
    <rect x="616" y="244" width="216" height="64" rx="15" fill="#2DC79A" fill-opacity="0.10" stroke="#2DC79A" stroke-width="1.5"/>
    <text x="724" y="266" text-anchor="middle" font-size="13" font-weight="600" fill="#5BE0BC">Reporters</text>
    <g font-size="11" font-weight="600">
      <rect x="630" y="276" width="92" height="24" rx="7" fill="#2DC79A" fill-opacity="0.20" stroke="#2DC79A" stroke-width="1.1"/>
      <text x="676" y="292" text-anchor="middle" fill="#5BE0BC">text · tty</text>
      <rect x="730" y="276" width="92" height="24" rx="7" fill="#2DC79A" fill-opacity="0.20" stroke="#2DC79A" stroke-width="1.1"/>
      <text x="776" y="292" text-anchor="middle" fill="#5BE0BC">SARIF 2.1.0</text>
    </g>
  </g>

  <!-- CI gate badge -->
  <g>
    <rect x="724" y="134" width="108" height="52" rx="12" fill="#F2B705" fill-opacity="0.14" stroke="#F2B705" stroke-width="1.4"/>
    <text x="778" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#F2C95B">CI gate</text>
    <text x="778" y="174" text-anchor="middle" font-size="11" fill="#F2C95B">≥ medium → exit 1</text>
  </g>
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="700" y1="150" x2="722" y2="160" marker-end="url(#ah-d)"/>
  </g>
</svg>
